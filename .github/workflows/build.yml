name: Build Android APK

# Сборка Release/Debug APK при пуше в main и загрузка артефакта со страницы Actions.
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Кеширование Gradle ускоряет повторные сборки
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4

      - name: Make scripts executable
        run: |
          chmod +x gradlew || true
          chmod +x scripts/build-apk.sh || true

      - name: Static project check
        run: python3 scripts/check_project.py

      - name: Print Gradle version
        run: ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace

      - name: Prepare forum artifacts
        run: |
          VERSION_NAME=$(grep -E 'versionName "' app/build.gradle | sed -E 's/.*versionName "([^"]+)".*/\1/')
          mkdir -p forum-build
          cp app/build/outputs/apk/debug/app-debug.apk "forum-build/NekoFlash-${VERSION_NAME}-debug.apk"
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then cp app/build/outputs/apk/release/app-release-unsigned.apk "forum-build/NekoFlash-${VERSION_NAME}-release-unsigned.apk"; fi
          cd forum-build
          sha256sum *.apk > checksums-sha256.txt
          ls -lh
          cat checksums-sha256.txt

      - name: Upload APK and checksum
        uses: actions/upload-artifact@v4
        with:
          name: NekoFlash-${{ github.sha }}-apk
          path: |
            forum-build/*.apk
            forum-build/checksums-sha256.txt
          if-no-files-found: error
          retention-days: 30
