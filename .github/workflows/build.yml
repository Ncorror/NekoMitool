name: Build Android APK

# Сборка Release/Debug APK при пуше в main и загрузка артефакта со страницы Actions.
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Кеширование Gradle ускоряет повторные сборки
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4

      - name: Make scripts executable
        run: |
          chmod +x gradlew || true
          chmod +x scripts/build-apk.sh || true

      - name: Static project check
        run: python3 scripts/check_project.py

      - name: Print Gradle version
        run: ./gradlew --version

      - name: Build Debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build_log.txt

      - name: Show build errors if failed
        if: failure()
        run: |
          echo "==================== ОШИБКИ СБОРКИ ===================="
          grep -E "^e: |error:|FAILED|What went wrong|Unresolved|Caused by|resource .* not found" build_log.txt | head -50 || echo "Маркеры ошибок не найдены — смотрите полный лог выше"
          echo "======================================================"

      - name: Prepare forum artifacts
        run: |
          set -e
          VERSION_NAME=$(grep -E 'versionName "' app/build.gradle | sed -E 's/.*versionName "([^"]+)".*/\1/')
          echo "Версия: $VERSION_NAME"
          echo "=== Поиск собранных APK ==="
          find app/build/outputs -name "*.apk" -print || true
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ Debug APK не найден — сборка не создала артефакт"
            exit 1
          fi
          mkdir -p forum-build
          cp "$APK" "forum-build/NekoMiFlash-${VERSION_NAME}-debug.apk"
          cd forum-build
          sha256sum *.apk > checksums-sha256.txt
          ls -lh
          cat checksums-sha256.txt

      - name: Upload APK and checksum
        uses: actions/upload-artifact@v4
        with:
          name: NekoFlash-${{ github.sha }}-apk
          path: |
            forum-build/*.apk
            forum-build/checksums-sha256.txt
          if-no-files-found: error
          retention-days: 30
